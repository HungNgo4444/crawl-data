# Docker Compose for Enhanced Crawler Architecture v2
# Multi-stage hybrid crawler with tiered storage

version: '3.8'

services:
  # PostgreSQL with partitioning support
  postgres:
    image: postgres:15-alpine
    container_name: crawler_postgres_v2
    environment:
      POSTGRES_DB: crawler_db
      POSTGRES_USER: crawler_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crawler_pass}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    volumes:
      - postgres_data_v2:/var/lib/postgresql/data
      - ./storage_layer/database/partitions.sql:/docker-entrypoint-initdb.d/01-partitions.sql
      - ./storage_layer/database/init:/docker-entrypoint-initdb.d/
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crawler_user -d crawler_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - crawler_network
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'

  # Redis for high-performance caching
  redis:
    image: redis:7-alpine
    container_name: crawler_redis_v2
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data_v2:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - crawler_network
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.2'

  # MinIO for object storage
  minio:
    image: minio/minio:latest
    container_name: crawler_minio_v2
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_data_v2:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - crawler_network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.1'

  # Enhanced crawler application
  crawler_app_v2:
    build:
      context: .
      dockerfile: Dockerfile.v2
    container_name: crawler_app_v2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      # Database configuration
      DATABASE_URL: postgresql+asyncpg://crawler_user:${POSTGRES_PASSWORD:-crawler_pass}@postgres:5432/crawler_db
      
      # Redis configuration
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      
      # MinIO configuration
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_SECURE: "false"
      
      # Crawler configuration
      CRAWLER_MODE: "hybrid"
      MAX_CONCURRENT_CRAWLS: 20
      LINK_DISCOVERY_ENABLED: "true"
      RSS_CRAWL_INTERVAL: 300  # 5 minutes
      
      # Performance settings
      BULK_INSERT_BATCH_SIZE: 100
      CACHE_TTL: 3600
      LOG_LEVEL: INFO
      
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs
      - crawler_temp_v2:/tmp/crawler
    ports:
      - "8080:8080"  # API/monitoring port
    restart: unless-stopped
    networks:
      - crawler_network
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 2G
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Link discovery service (separate for scaling)
  link_discovery:
    build:
      context: .
      dockerfile: Dockerfile.v2
    container_name: crawler_link_discovery
    command: ["python", "-m", "crawler_layer.link_discovery.main"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://crawler_user:${POSTGRES_PASSWORD:-crawler_pass}@postgres:5432/crawler_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LOG_LEVEL: INFO
      DISCOVERY_INTERVAL: 300
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - crawler_network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.2'

  # Content extraction workers (scalable)
  content_extractor:
    build:
      context: .
      dockerfile: Dockerfile.v2
    command: ["python", "-m", "crawler_layer.content_extraction.worker"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://crawler_user:${POSTGRES_PASSWORD:-crawler_pass}@postgres:5432/crawler_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      WORKER_CONCURRENCY: 10
      LOG_LEVEL: INFO
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs
      - crawler_temp_v2:/tmp/crawler
    restart: unless-stopped
    networks:
      - crawler_network
    deploy:
      replicas: 2  # Scale as needed
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'

  # Monitoring and metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: crawler_prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data_v2:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - crawler_network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.3'

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: crawler_grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data_v2:/var/lib/grafana
      - ./monitoring/grafana:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - crawler_network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.2'

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: crawler_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - crawler_app_v2
      - grafana
    restart: unless-stopped
    networks:
      - crawler_network
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'

volumes:
  postgres_data_v2:
    driver: local
  redis_data_v2:
    driver: local
  minio_data_v2:
    driver: local
  prometheus_data_v2:
    driver: local
  grafana_data_v2:
    driver: local
  crawler_temp_v2:
    driver: local

networks:
  crawler_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16